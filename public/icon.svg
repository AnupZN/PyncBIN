<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#0f172a"/>
  <!-- Glowing Neon Accents -->
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#06b6d4" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Main Secure Pad Logo -->
  <g filter="url(#shadow)">
    <!-- Brackets -->
    <path d="M 160,160 L 100,256 L 160,352" stroke="url(#glow)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <path d="M 352,160 L 412,256 L 352,352" stroke="url(#glow)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- Lock Body -->
    <rect x="196" y="240" width="120" height="96" rx="16" fill="url(#glow)"/>
    <!-- Lock Shackle -->
    <path d="M 216,240 V 200 A 40,40 0 0,1 296,200 V 240" stroke="url(#glow)" stroke-width="20" stroke-linecap="round" fill="none" />
    <!-- Keyhole -->
    <circle cx="256" cy="280" r="10" fill="#0f172a" />
    <path d="M 256,288 L 256,310" stroke="#0f172a" stroke-width="8" stroke-linecap="round" />
  </g>
</svg>
